# voice-sms/kannel/sms.conf
# Kannel SMS Gateway — Multilingual Configuration
# Supports Unicode SMS for Tamil, Hindi, Malayalam, English
#
# Install Kannel: sudo apt install kannel
# Start:          sudo bearerbox /etc/kannel/kannel.conf

group = core
admin-port = 13000
admin-password = kannel_admin_pass
status-password = kannel_status_pass
log-file = /var/log/kannel/bearerbox.log
log-level = 1

# ── SMSC Connection (replace with your SIM800/GSM modem or SMPP) ──────────
group = smsc
smsc = at
smsc-id = gsm-modem-1
port = /dev/ttyUSB0         # update to your modem device
speed = 115200
sim-buffering = true
connect-allow-ip = "*"

# ── SMS Box ────────────────────────────────────────────────────────────────
group = smsbox
bearerbox-host = localhost
sendsms-port = 13013
log-file = /var/log/kannel/smsbox.log
log-level = 1

# ── Incoming SMS → Legal AI Handler ───────────────────────────────────────
group = sms-service
keyword = default
catch-all = yes
max-messages = 2

# Forward all incoming SMS to the Python SMS handler
get-url = "http://localhost:5001/sms/receive?sender=%p&text=%b&lang=auto"

# Unicode encoding for multilingual SMS (Tamil, Hindi, Malayalam)
accepted-smsc = gsm-modem-1
charset = UTF-8
coding = 2                  # 2 = Unicode (required for non-Latin scripts)

# ── Send SMS (used by Python sms_handler.py) ──────────────────────────────
group = sendsms-user
username = kannel
password = kannel
max-messages = 2
user-allow-ip = "127.0.0.1"
