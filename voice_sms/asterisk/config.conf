; voice-sms/asterisk/extensions.conf
; Legal AI Assistant IVR
; Languages: English, Tamil, Hindi, Malayalam

; Call Flow
; Incoming Call
; -> Language Selection
; -> Record Question
; -> Send to FastAPI (Whisper + AI)
; -> Play TTS Response


; ─────────────────────────────────────────────
; DEFAULT CONTEXT
; Ensures incoming calls go to IVR
; ─────────────────────────────────────────────
[default]
exten => s,1,Goto(legal-ai-main,s,1)



; ─────────────────────────────────────────────
; MAIN LANGUAGE MENU
; ─────────────────────────────────────────────
[legal-ai-main]

exten => s,1,Answer()
exten => s,2,Wait(1)
exten => s,3,Playback(legal-ai/welcome-english)
exten => s,4,Background(legal-ai/language-menu)
exten => s,5,WaitExten(10)

; -------------------------------
; ENGLISH
; -------------------------------
exten => 1,1,Set(LANG=english)
exten => 1,2,Playback(legal-ai/welcome-english)
exten => 1,3,Goto(legal-ai-record,s,1)

; -------------------------------
; TAMIL
; -------------------------------
exten => 2,1,Set(LANG=tamil)
exten => 2,2,Playback(legal-ai/welcome-tamil)
exten => 2,3,Goto(legal-ai-record,s,1)

; -------------------------------
; HINDI
; -------------------------------
exten => 3,1,Set(LANG=hindi)
exten => 3,2,Playback(legal-ai/welcome-hindi)
exten => 3,3,Goto(legal-ai-record,s,1)

; -------------------------------
; MALAYALAM
; -------------------------------
exten => 4,1,Set(LANG=malayalam)
exten => 4,2,Playback(legal-ai/welcome-malayalam)
exten => 4,3,Goto(legal-ai-record,s,1)


; -------------------------------
; INVALID INPUT
; -------------------------------
exten => i,1,Playback(legal-ai/invalid-option)
exten => i,2,Goto(legal-ai-main,s,4)


; -------------------------------
; TIMEOUT
; -------------------------------
exten => t,1,Playback(legal-ai/no-input)
exten => t,2,Goto(legal-ai-main,s,4)



; ─────────────────────────────────────────────
; RECORD USER QUESTION
; ─────────────────────────────────────────────
[legal-ai-record]

; Ask question
exten => s,1,Playback(legal-ai/ask-question-${LANG})

; Record audio
; 3 seconds silence stop
; max 30 seconds
exten => s,2,Record(/tmp/legal_query_${UNIQUEID}.wav,3,30,q)

; Send to AI processing script
exten => s,3,AGI(/var/lib/asterisk/agi-bin/process_query.py,${UNIQUEID},${LANG})

; Play generated TTS response
exten => s,4,Playback(legal_reply_${UNIQUEID})

; Goodbye message
exten => s,5,Playback(legal-ai/goodbye-${LANG})

; End call
exten => s,6,Hangup()



; ─────────────────────────────────────────────
; ERROR HANDLING
; ─────────────────────────────────────────────
[legal-ai-error]

exten => s,1,Playback(legal-ai/error-english)
exten => s,2,Hangup()