version: "3.9"

# ─────────────────────────────────────────────────────────────
# Legal AI Assistant — Full Stack
# Run everything:  docker-compose up --build
# Stop:            docker-compose down
# ─────────────────────────────────────────────────────────────

services:

  # ── 1. Qdrant — Vector Database ────────────────────────────
  qdrant:
    image: qdrant/qdrant:latest
    container_name: legal-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── 2. Elasticsearch — Keyword Search ──────────────────────
  elasticsearch:
    image: elasticsearch:8.13.0
    container_name: legal-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "9200:9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9200/_cluster/health"]
      interval: 15s
      timeout: 10s
      retries: 10

  # ── 3. Neo4j — Knowledge Graph ─────────────────────────────
  neo4j:
    image: neo4j:5.19
    container_name: legal-neo4j
    environment:
      - NEO4J_AUTH=none
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "neo4j", "-p", "", "RETURN 1"]
      interval: 15s
      timeout: 10s
      retries: 10

  # ── 4. Ollama — Local LLM (Phi-3 Mini) ────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: legal-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped
    # Pull Phi-3 on first start
    entrypoint: ["/bin/sh", "-c", "ollama serve & sleep 10 && ollama pull phi3 && wait"]

  # ── 5. FastAPI Backend ─────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: legal-backend
    ports:
      - "8000:8000"
    environment:
      - QDRANT_URL=http://qdrant:6333
      - ELASTICSEARCH_URL=http://elasticsearch:9200
      - NEO4J_URI=bolt://neo4j:7687
      - OLLAMA_URL=http://ollama:11434
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - LLM_MODE=${LLM_MODE:-auto}
      - WHISPER_MODEL=${WHISPER_MODEL:-small}
      - TTS_OUTPUT_DIR=/tmp/tts_audio
      - UPLOAD_DIR=/tmp/uploads
    depends_on:
      qdrant:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    volumes:
      - tts_audio:/tmp/tts_audio
      - uploads:/tmp/uploads
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── 6. React Frontend ──────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: legal-frontend
    ports:
      - "5173:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  qdrant_data:
  es_data:
  neo4j_data:
  ollama_data:
  tts_audio:
  uploads:
